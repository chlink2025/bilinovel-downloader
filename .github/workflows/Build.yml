name: Build Cross Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:   [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: arm64     # darwin/arm64 在 ubuntu 上 cross-compile 需要額外設定，有時不穩定
          - goos: windows
            goarch: arm64     # windows/arm64 cross-compile 通常需要額外工具鏈

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=myapp
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -o "${BINARY_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}" ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilinovel-downloader-${{ matrix.goos }}-${{ matrix.goarch }}
          path: myapp-${{ matrix.goos }}-${{ matrix.goarch }}*
