name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v5

    - name: Build
      run: |
        go build -o myapp-${{ matrix.os }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MyApp Binaries
        path: myapp-${{ matrix.os }}
